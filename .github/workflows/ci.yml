name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --group dev --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy codeflow

      - name: Unit tests with coverage
        run: >
          uv run pytest -q
          --ignore=tests/mini_agent/environments/extra
          --ignore=tests/mini_agent/environments/test_docker.py
          --ignore=tests/mini_agent/environments/test_singularity.py
          --ignore=tests/mini_agent/run/test_swebench.py
          --ignore=tests/mini_agent/run/test_swebench_single.py
          --ignore=tests/mini_agent/test_fire.py
          -m "not fire"
          --cov=codeflow
          --cov-report=term-missing
          --cov-fail-under=70
